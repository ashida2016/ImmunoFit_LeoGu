{% extends "base.html" %}

{% block content %}
<div class="row align-items-center justify-content-center text-center mt-5">
    <div class="col-md-10">
        <div class="p-5 mb-4 bg-white rounded-3 shadow-sm border border-light">
            <div class="container-fluid py-5">
                <h1 class="display-4 fw-bold text-primary mb-4">ImmunoFit™</h1>
                <p class="fs-4 text-muted mb-4">{{ t('welcome_msg') }}</p>
                <hr class="my-4">
                <p class="fs-5">{{ t('core_goal') }}</p>
                <div class="d-grid gap-3 d-sm-flex justify-content-sm-center mt-5">
                    <a href="{{ url_for('patient_mode') }}" class="btn btn-outline-primary btn-lg px-4 gap-3 rounded-pill">{{ t('patient_mode') }}</a>
                    <a href="{{ url_for('clinician_mode') }}" class="btn btn-primary btn-lg px-4 rounded-pill">{{ t('clinician_mode') }}</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
